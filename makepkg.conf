DLAGENTS=('file::/usr/bin/curl -qgC - -o %o %u'
          'ftp::/usr/bin/curl -qgfC - --ftp-pasv --retry 3 --retry-delay 3 -o %o %u'
          'http::/usr/bin/curl -qgb "" -fLC - --retry 3 --retry-delay 3 -o %o %u'
          'https::/usr/bin/curl -qgb "" -fLC - --retry 3 --retry-delay 3 -o %o %u'
          'rsync::/usr/bin/rsync --no-motd -z %u %o'
          'scp::/usr/bin/scp -C %u %o')
VCSCLIENTS=('bzr::breezy'
            'fossil::fossil'
            'git::git'
            'hg::mercurial'
            'svn::subversion')

CARCH="x86_64"
CHOST="x86_64-pc-linux-gnu"
CFLAGS="-march=x86-64-v3 -O2 -pipe -fno-plt -fPIC -DNDEBUG -w"
CXXFLAGS="$CFLAGS -Wp,-D_GLIBCXX_ASSERTIONS"
LDFLAGS="-Wl,-O1,--sort-common,--as-needed,-z,relro,-z,now"
LTOFLAGS="-flto=auto"
RUSTFLAGS="-C opt-level=2 -C target-cpu=x86-64-v3"
CPPFLAGS="-O2 -pipe -fPIC -DNDEBUG -w"
MAKEFLAGS="-j$(nproc)"
DEBUG_CFLAGS="-g"
DEBUG_CXXFLAGS="$DEBUG_CFLAGS"
TESTSUITEFLAGS="-j$(nproc)"

BUILDENV=(!distcc color !ccache check !sign)
BUILDDIR="/build/workdir"
OPTIONS=(strip docs lfs !libtool !staticlibs emptydirs zipman purge !debug lto)

INTEGRITY_CHECK=(sha256)
STRIP_BINARIES="--strip-all"
STRIP_SHARED="--strip-unneeded"
STRIP_STATIC="--strip-debug"

MAN_DIRS=({usr{,/local}{,/share},opt/*}/{man,info})
DOC_DIRS=(usr/{,local/}{,share/}{doc,gtk-doc} opt/*/{doc,gtk-doc})
PURGE_TARGETS=(usr/{,share}/info/dir .packlist *.pod)

DBGSRCDIR="/usr/src/debug"
PKGDEST="/build/packages"
SRCDEST="/build/sources"
PACKAGER="Github Action <build-bot@$(cat /proc/sys/kernel/hostname)>"

COMPRESSGZ=(gzip -c -f -n)
COMPRESSBZ2=(bzip2 -c -f)
COMPRESSXZ=(xz -c -z --threads=0 -)
COMPRESSZST=(zstd -c -z -q --threads=0 --ultra -20 -)
COMPRESSLRZ=(lrzip -q)
COMPRESSLZO=(lzop -q)
COMPRESSZ=(compress -c -f)
COMPRESSLZ4=(lz4 -q)
COMPRESSLZ=(lzip -c -f)
PKGEXT='.pkg.tar.zst'
SRCEXT='.src.tar.xz'

gnu_url="https://ftp.gnu.org/gnu"
xorg_url="https://x.org/pub/individual"
kde_url="https://download.kde.org/stable"
kernel_org_url="https://cdn.kernel.org/pub"
cpan_url="https://cpan.metacpan.org/authors/id"
debian_url="https://deb.debian.org/debian/pool"
lfs_patches="https://linuxfromscratch.org/patches/downloads"
mozilla_url="https://download-installer.cdn.mozilla.net/pub/"

. /etc/pacman.d/localedir 2>/dev/null
. /etc/pacman.d/rmandir 2>/dev/null
. /etc/pacman.d/functions.sh 2>/dev/null
. /etc/pacman.d/env.sh 2>/dev/null
. ${startdir}/env.sh 2>/dev/null

export KC{,PP}FLAGS="-march=x86-64-v3 -O2"
export NINJA_STATUS="[%r %f/%t %es] "

if is_true "${run_test}"; then
   BUILDENV=(`echo ${BUILDENV[@]} | sed 's/\s!check\s/ check /'`)
else
   BUILDENV=(`echo ${BUILDENV[@]} | sed 's/\scheck\s/ !check /'`)
fi

